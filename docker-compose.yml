version: "3.8"

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    mem_limit: 1g
    cpus: "1.0"
    restart: unless-stopped
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - ./data/prometheus:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-remote-write-receiver

    ports:
      - "9090:9090"

  loki:
    image: grafana/loki:latest
    container_name: loki
    mem_limit: 4g
    cpus: "1.0"
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - ./config/loki.yaml:/etc/loki/local-config.yaml
      - ./data/loki:/tmp/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"

  tempo:
    image: grafana/tempo:2.10.0
    container_name: tempo
    mem_limit: 1g
    cpus: "1.0"
    restart: unless-stopped
    env_file:
      - ./.env
    command: [ "-config.file=/etc/tempo/tempo.yaml", "-config.expand-env=true" ]
    volumes:
      - ./config/tempo.yaml:/etc/tempo/tempo.yaml
      - ./data/tempo:/var/tempo
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    mem_limit: 1g
    cpus: "1.0"
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./data/grafana:/var/lib/grafana
    ports:
      - "3000:3000"
