groups:
  - name: cgv-core-alerts
    rules:

      # 🔴 1. Success Rate < 95%
      - alert: LowSuccessRate
        expr: |
          (
            sum(rate(http_server_requests_seconds_count{status!~"5.."}[5m]))
            /
            sum(rate(http_server_requests_seconds_count[5m]))
          ) * 100 < 95
        for: 2m
        labels:
          severity: critical
          scope: application
        annotations:
          summary: "🚨 Success Rate below 95%"
          description: |
            최근 5분 기준 요청 성공률이 95% 아래로 감소했습니다.
            사용자 체감 장애로 이어질 가능성이 있습니다.

            확인 포인트:
            - 5xx 증가 여부
            - 응답 시간(latency) 상승 여부
            - 최근 배포/설정 변경 여부
            - DB/Cache/외부 의존성 지연 여부

            실제 원인은 로그/트레이스 기반으로 확인 필요.


      # 🔴 2. 5xx Error Rate > 5%
      - alert: High5xxErrorRate
        expr: |
          (
            sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
            /
            sum(rate(http_server_requests_seconds_count[5m]))
          ) * 100 > 5
        for: 2m
        labels:
          severity: critical
          scope: application
        annotations:
          summary: "🚨 5xx Error Rate above 5%"
          description: |
            서버 내부 오류(5xx)가 5% 이상 발생 중입니다.
            백엔드 내부 처리 실패 가능성이 높습니다.

            점검 항목:
            - Pod 재시작 / CrashLoop 여부
            - Thread pool / connection pool 상태
            - DB/Redis latency
            - 특정 API endpoint 집중 오류 여부


      # 🟡 3. Pod Pending > 0 (5분 지속)
      - alert: PodPending
        expr: sum(kube_pod_status_phase{phase="Pending"}) > 0
        for: 5m
        labels:
          severity: warning
          scope: kubernetes
        annotations:
          summary: "⚠️ Pod Pending 지속"
          description: |
            5분 이상 Pending 상태인 Pod가 존재합니다.

            가능 원인:
            - 노드 리소스 부족
            - 스케줄링 제약 조건
            - 이미지 pull 문제

            클러스터 리소스 상태 확인 필요.


      # 🟡 4. Node CPU > 80% (5분 지속)
      - alert: HighNodeCPU
        expr: |
          100 - (
            avg by (instance)
            (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100
          ) > 80
        for: 5m
        labels:
          severity: warning
          scope: infrastructure
        annotations:
          summary: "⚠️ Node CPU above 80%"
          description: |
            특정 노드의 CPU 사용률이 80% 이상으로 5분간 지속되고 있습니다.

            확인 포인트:
            - 특정 Pod가 CPU를 과점하고 있는지
            - HPA가 확장 중인지
            - 노드 증설 필요 여부
